name: Daily price report

on:
  schedule:
    # GitHub Actions cron uses UTC. 04:00-05:55 UTC = 12:00-13:55 Asia/Taipei.
    # GitHub scheduled runs are best-effort and can be delayed or dropped, so this
    # retries every 5 minutes and relies on the duplicate guard below to send once.
    - cron: "*/5 4-5 * * *"
  workflow_dispatch:

concurrency:
  group: daily-price-report
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  price-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check duplicate scheduled run
        id: duplicate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python should_run_report.py

      - name: Install dependencies
        if: steps.duplicate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Generate report
        if: steps.duplicate.outputs.should_run == 'true'
        run: python price_report.py --output reports/latest.md --sleep 1 --timezone Asia/Taipei

      - name: Send Telegram message
        if: steps.duplicate.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_telegram.py reports/latest.md --allow-missing-secrets

      - name: Upload report artifact
        if: steps.duplicate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-price-report
          path: reports/latest.md
